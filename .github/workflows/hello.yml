name: Example Workflow

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run build
        run: echo "Building the project..."

  deploy:
    runs-on: ubuntu-latest
    needs: build   # 👈 This makes deploy wait for build

    steps:
      - name: Deploy step
        run: echo "Deploying the project..."